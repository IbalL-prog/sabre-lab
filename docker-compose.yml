services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - lab_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/ui-reservasi
      dockerfile: Dockerfile
      args:
        VITE_API_TOKEN: ${API_AUTH_TOKEN:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lab_data:
